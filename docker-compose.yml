services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: switchgear-estimate-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    env_file:
      - ./backend/.env
    environment:
      PORT: 4000
      DB_PATH: /data/data.db
      TZ: Asia/Seoul
    volumes:
      - ./backend-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
